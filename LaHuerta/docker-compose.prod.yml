services:
  db:
    image: mysql:8.0
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lahuerta_network

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn lahuertabackend.wsgi:application --bind 0.0.0.0:8000
      "
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lahuerta_network

  frontend:
    build:
      context: ./frontend/lahuertafrontend
      args:
        REACT_APP_API_BASE_URL: https://lahuerta-app.com/api
    networks:
      - lahuerta_network

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./backend/staticfiles:/app/staticfiles
    depends_on:
      - backend
      - frontend
    networks:
      - lahuerta_network
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lahuerta.rule=Host(`lahuerta-app.com`)"
      - "traefik.http.routers.lahuerta.entrypoints=web"
      - "traefik.http.services.lahuerta.loadbalancer.server.port=80"

volumes:
  mysql_data:

networks:
  lahuerta_network:
    driver: bridge
  dokploy-network:
    external: true
